<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — Codey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #050a12; --bg-surface: #0a1628; --border: #1e3a5f;
            --blue-primary: #2563eb; --blue-light: #60a5fa;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569;
            --green: #22c55e; --red: #ef4444;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; text-decoration: none; color: var(--text-primary); }
        .logo span { color: var(--blue-light); }
        .form-container { width: 100%; max-width: 400px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; text-align: center; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        input[type="email"] { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); font-size: 14px; font-family: 'Inter', system-ui, sans-serif; outline: none; transition: border-color 150ms ease, box-shadow 150ms ease; }
        input::placeholder { color: var(--text-muted); }
        input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        .submit-btn { width: 100%; padding: 12px 16px; border: none; border-radius: 6px; background: var(--blue-primary); color: white; font-size: 14px; font-weight: 600; font-family: 'Inter', system-ui, sans-serif; cursor: pointer; transition: all 150ms ease; margin-top: 8px; }
        .submit-btn:hover { filter: brightness(1.1); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
        .footer-text a { color: var(--blue-light); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .success-msg { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 6px; padding: 12px 16px; text-align: center; font-size: 14px; color: var(--green); display: none; }
        .error-msg { color: var(--red); font-size: 13px; margin-top: 6px; display: none; text-align: center; }
    </style>
</head>
<body>

<a href="index.html" class="logo"><span>[</span>ODEY</a>

<div class="form-container">
    <h1>Reset your password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <div id="success-msg" class="success-msg">If an account with that email exists, a reset link has been sent. Check your inbox.</div>

    <form id="reset-form" onsubmit="handleReset(event)">
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="error-msg" id="reset-error"></div>
        <button type="submit" class="submit-btn" id="submit-btn">Send reset link</button>
    </form>

    <p class="footer-text">
        Remember your password? <a href="login.html">Sign in</a>
    </p>
</div>

<script>
function handleReset(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const email = document.getElementById('email').value;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    document.getElementById('reset-error').style.display = 'none';

    fetch('https://codey-jc2r.onrender.com/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    })
    .then(resp => {
        if (!resp.ok) return resp.json().then(d => { throw new Error(d.detail || 'Request failed'); });
        return resp.json();
    })
    .then(() => {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    })
    .catch(err => {
        // Always show success to prevent email enumeration
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    });
}
</script>

</body>
</html>

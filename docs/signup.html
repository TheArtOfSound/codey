<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — Codey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #050a12;
            --bg-surface: #0a1628;
            --border: #1e3a5f;
            --blue-primary: #2563eb;
            --blue-light: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --green: #22c55e;
            --red: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .logo span { color: var(--blue-light); }
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 32px;
            text-align: center;
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 150ms ease;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
        }
        .oauth-btn:hover { border-color: var(--blue-primary); background: #111f38; }
        .oauth-btn svg { width: 20px; height: 20px; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            outline: none;
            transition: border-color 150ms ease, box-shadow 150ms ease;
        }
        input::placeholder { color: var(--text-muted); }
        input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            background: var(--blue-primary);
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 150ms ease;
            margin-top: 8px;
        }
        .submit-btn:hover { filter: brightness(1.1); }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .footer-text a { color: var(--blue-light); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .plan-banner {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--blue-light);
        }
        .success-screen {
            display: none;
            text-align: center;
        }
        .success-screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .success-check {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
            font-size: 24px;
        }
        .success-screen h2 { font-size: 20px; font-weight: 600; }
        .success-screen p { color: var(--text-secondary); font-size: 14px; }
        .error-msg {
            color: var(--red);
            font-size: 13px;
            margin-top: 4px;
            display: none;
        }
        .credits-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }
    </style>
</head>
<body>

<a href="index.html" class="logo"><span>[</span>ODEY</a>

<div class="form-container">
    <div id="signup-form">
        <h1>Create your account</h1>

        <div id="plan-banner" class="plan-banner" style="display: none;"></div>

        <form id="email-form" onsubmit="handleSignup(event)">
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
                <div class="error-msg" id="email-error"></div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="8+ characters" minlength="8" required>
                <div class="error-msg" id="password-error"></div>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Create account</button>
        </form>

        <p class="credits-note">You'll get 10 free credits to start building immediately.</p>

        <p class="footer-text">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <div id="success-screen" class="success-screen">
        <div class="success-check">&#10003;</div>
        <h2>Account created.</h2>
        <p>You have 10 free credits. Start building now.</p>
        <a href="index.html" class="submit-btn" style="text-decoration:none; text-align:center; display:block; max-width:300px;">Go to Codey</a>
    </div>
</div>

<script>
    // Check for plan parameter
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan');
    if (plan && plan !== 'free') {
        const banner = document.getElementById('plan-banner');
        const names = { starter: 'Starter ($19/mo)', pro: 'Pro ($49/mo)', team: 'Team ($149/mo)' };
        banner.textContent = 'You selected the ' + (names[plan] || plan) + ' plan. Create your account to continue.';
        banner.style.display = 'block';
    }

    function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Clear errors
        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

        // Validate
        if (password.length < 8) {
            const err = document.getElementById('password-error');
            err.textContent = 'Password must be at least 8 characters.';
            err.style.display = 'block';
            return;
        }

        // Show loading
        btn.disabled = true;
        btn.textContent = 'Creating account...';

        // Call real backend API
        fetch('https://codey-jc2r.onrender.com/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, name })
        })
        .then(resp => {
            if (!resp.ok) return resp.json().then(d => { throw new Error(d.detail || 'Signup failed'); });
            return resp.json();
        })
        .then(data => {
            // Store token and user info
            localStorage.setItem('codey_token', data.token);
            localStorage.setItem('codey_user', JSON.stringify(data.user || { name, email, plan: plan || 'free', credits: 10 }));

            // Show success
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('success-screen').classList.add('active');
        })
        .catch(err => {
            const errEl = document.getElementById('email-error');
            errEl.textContent = err.message || 'Something went wrong. Try again.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create account';
        });
    }
</script>

</body>
</html>

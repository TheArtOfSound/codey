<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referrals — Codey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-deep: #050a12; --bg-surface: #0a1628; --border: #1e3a5f; --blue-primary: #2563eb; --blue-light: #60a5fa; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569; --green: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; padding: 24px; }
        .container { max-width: 600px; margin: 0 auto; }
        .nav a { color: var(--text-primary); text-decoration: none; font-size: 20px; font-weight: 700; display: inline-block; margin-bottom: 32px; }
        .nav span { color: var(--blue-light); }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
        .reward { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 24px; }
        .reward .amount { font-size: 36px; font-weight: 700; color: var(--green); }
        .reward .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .link-box { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px; }
        .link-box label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        .link-row { display: flex; gap: 8px; }
        .link-input { flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: #050a12; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; }
        .btn-copy { padding: 10px 16px; border-radius: 6px; border: none; background: var(--blue-primary); color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
        .stat .value { font-size: 24px; font-weight: 700; color: var(--blue-light); }
        .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }
        .share-btns { display: flex; gap: 12px; margin-bottom: 24px; }
        .share-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-primary); font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; text-decoration: none; }
        .share-btn:hover { border-color: var(--blue-primary); background: #111f38; }
        .back a { color: var(--blue-light); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav"><a href="dashboard.html"><span>[</span>ODEY</a></div>

    <h1>Invite friends, earn credits</h1>
    <p class="subtitle">When someone you refer upgrades to a paid plan, you both get 50 bonus credits.</p>

    <div class="reward">
        <div class="amount">50</div>
        <div class="label">bonus credits for you and your friend</div>
    </div>

    <div class="link-box">
        <label>Your referral link</label>
        <div class="link-row">
            <input type="text" class="link-input" id="ref-link" readonly>
            <button class="btn-copy" onclick="copyLink()">Copy</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><div class="value" id="r-invited">0</div><div class="label">Invited</div></div>
        <div class="stat"><div class="value" id="r-converted">0</div><div class="label">Converted</div></div>
        <div class="stat"><div class="value" id="r-earned">0</div><div class="label">Credits earned</div></div>
    </div>

    <div class="share-btns">
        <a class="share-btn" id="share-x" href="#" target="_blank">Share on X</a>
        <a class="share-btn" id="share-linkedin" href="#" target="_blank">Share on LinkedIn</a>
    </div>

    <div class="back"><a href="dashboard.html">&larr; Back to dashboard</a></div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('codey_user') || '{}');
const userId = user.id || 'unknown';
const refCode = userId.substring(0, 8);
const refLink = 'https://theartofsound.github.io/codey/signup.html?ref=' + refCode;

document.getElementById('ref-link').value = refLink;
document.getElementById('share-x').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent('I\'ve been using Codey — the coding AI that actually understands codebase structure. Get 50 free credits: ' + refLink);
document.getElementById('share-linkedin').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(refLink);

function copyLink() {
    navigator.clipboard.writeText(refLink);
    document.querySelector('.btn-copy').textContent = 'Copied!';
    setTimeout(() => document.querySelector('.btn-copy').textContent = 'Copy', 2000);
}

// Load referral stats
const token = localStorage.getItem('codey_token');
if (token) {
    fetch('https://codey-jc2r.onrender.com/referrals', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json())
        .then(d => {
            document.getElementById('r-invited').textContent = d.total_invited || 0;
            document.getElementById('r-converted').textContent = d.total_converted || 0;
            document.getElementById('r-earned').textContent = d.total_credits_earned || 0;
        })
        .catch(() => {});
}
</script>
</body>
</html>

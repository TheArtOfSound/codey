<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Codey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #050a12; --bg-surface: #0a1628; --border: #1e3a5f;
            --blue-primary: #2563eb; --blue-light: #60a5fa;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569;
            --green: #22c55e; --red: #ef4444;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; text-decoration: none; color: var(--text-primary); }
        .logo span { color: var(--blue-light); }
        .form-container { width: 100%; max-width: 400px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 32px; text-align: center; }
        .oauth-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 150ms ease; margin-bottom: 12px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif; }
        .oauth-btn:hover { border-color: var(--blue-primary); background: #111f38; }
        .oauth-btn svg { width: 20px; height: 20px; }
        .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; color: var(--text-muted); font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); font-size: 14px; font-family: 'Inter', system-ui, sans-serif; outline: none; transition: border-color 150ms ease, box-shadow 150ms ease; }
        input::placeholder { color: var(--text-muted); }
        input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        .submit-btn { width: 100%; padding: 12px 16px; border: none; border-radius: 6px; background: var(--blue-primary); color: white; font-size: 14px; font-weight: 600; font-family: 'Inter', system-ui, sans-serif; cursor: pointer; transition: all 150ms ease; margin-top: 8px; }
        .submit-btn:hover { filter: brightness(1.1); }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
        .footer-text a { color: var(--blue-light); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .forgot { text-align: right; margin-bottom: 16px; }
        .forgot a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
        .forgot a:hover { color: var(--blue-light); }
        .error-msg { color: var(--red); font-size: 13px; margin-top: 6px; display: none; text-align: center; }
    </style>
</head>
<body>

<a href="index.html" class="logo"><span>[</span>ODEY</a>

<div class="form-container">
    <h1>Sign in</h1>

    <button class="oauth-btn" onclick="window.location.href='https://codey-jc2r.onrender.com/auth/github'">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
    </button>

    <button class="oauth-btn" onclick="window.location.href='https://codey-jc2r.onrender.com/auth/google'">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
    </button>

    <div class="divider">or</div>

    <form onsubmit="handleLogin(event)">
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" required>
        </div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
        <div class="error-msg" id="login-error">Invalid email or password.</div>
        <button type="submit" class="submit-btn" id="submit-btn">Sign in</button>
    </form>

    <p class="footer-text">
        Don't have an account? <a href="signup.html">Sign up</a>
    </p>
</div>

<script>
function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    document.getElementById('login-error').style.display = 'none';

    fetch('https://codey-jc2r.onrender.com/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    })
    .then(resp => {
        if (!resp.ok) return resp.json().then(d => { throw new Error(d.detail || 'Invalid credentials'); });
        return resp.json();
    })
    .then(data => {
        localStorage.setItem('codey_token', data.token);
        localStorage.setItem('codey_user', JSON.stringify(data.user || { email }));
        window.location.href = 'index.html';
    })
    .catch(err => {
        const errEl = document.getElementById('login-error');
        errEl.textContent = err.message || 'Invalid email or password.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
    });
}
</script>

</body>
</html>
